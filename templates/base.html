{% load static %}
<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="shortcut icon" type="image/png" href="{% static 'img/favicon.png' %}" />
    <link rel="stylesheet" href="{% static 'css/styles.css' %}" />
    <title>{% block title %}{% endblock title %} | Red Zone</title>
    <script src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js" defer></script>
    <script src="{% static 'js/carousel.js' %}"></script>
</head>

<body>
    <!--  Header sticky  -->
    <header class="sticky-header">
        <div class="header-content" x-data="{ open: false }">
            <a href="/" id="logo"><img src="{% static 'img/logo_redzone.png' %}" alt="Logo Red Zone" /></a>
            <button class="burger" @click="open = !open" :class="{ 'active': open }" aria-label="Ouvrir le menu"
                aria-expanded="false">
                <span></span>
                <span></span>
                <span></span>
            </button>
            <nav class="menu" :class="{ 'open': open }">
                <a href=" {% url 'home' %}" class="menu-item {% block home_active %}{% endblock %}">Home</a>
                <a href="{% url 'gallery' %}" class="menu-item {% block gallery_active %}{% endblock %}">Gallery</a>
                <a href="{% if user.is_authenticated %}{% url 'member-space' %}{% else %}{% url 'redzone' %}{% endif %}"
                    class="menu-item {% block redzone_active %}{% endblock %}">Red Zone</a>
            </nav>
        </div>
    </header>

    <main class="main-content">
        {% block content %} {% endblock content %}
    </main>
    <footer>
        <div class="copyright">
            © {% now "Y" %} Red Zone Team
        </div>
        <div class="separator">&nbsp;&nbsp;|&nbsp;&nbsp;</div>
        <div class="copyright">
            all rights reserved
        </div>
        <div class="separator">&nbsp;&nbsp;|&nbsp;&nbsp;</div>
        <div class="copyright">
            designed and build by puco with ❤️
        </div>
        </div>
    </footer>
</body>

</html>
